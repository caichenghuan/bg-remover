<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一键抠图 & 卡通化</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f; color: #eee; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    padding: 32px 0 20px; text-align: center;
  }
  header h1 { font-size: 1.6rem; font-weight: 600; }
  header p { color: #888; font-size: 0.9rem; margin-top: 6px; }

  .container { width: 100%; max-width: 900px; padding: 0 20px; }

  .mode-tabs, .style-tabs {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .mode-tab, .style-tab {
    padding: 10px 28px; border-radius: 12px; border: 1px solid #333;
    background: #1a1a1a; color: #888; cursor: pointer; font-size: 0.95rem;
    font-weight: 500; transition: all .2s;
  }
  .mode-tab:hover, .style-tab:hover { border-color: #666; color: #ccc; }
  .mode-tab.active { background: #7c5cfc; border-color: #7c5cfc; color: #fff; }
  .style-tab.active { background: #f0a040; border-color: #f0a040; color: #111; }

  #styleRow { display: none; }

  .drop-zone {
    border: 2px dashed #444; border-radius: 16px;
    padding: 60px 20px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 24px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #7c5cfc; background: rgba(124,92,252,0.08);
  }
  .drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .drop-zone .hint { color: #aaa; font-size: 0.95rem; }
  .drop-zone .sub { color: #666; font-size: 0.8rem; margin-top: 6px; }

  .preview-area {
    display: none; gap: 20px; margin-bottom: 24px;
  }
  .preview-area.active { display: grid; grid-template-columns: 1fr 1fr; }

  .preview-card {
    background: #1a1a1a; border-radius: 12px;
    padding: 12px; text-align: center;
  }
  .preview-card .label {
    font-size: 0.8rem; color: #888; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .preview-card .img-wrap {
    position: relative; width: 100%; padding-top: 100%;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><rect width="10" height="10" fill="%23333"/><rect x="10" y="10" width="10" height="10" fill="%23333"/><rect x="10" width="10" height="10" fill="%23444"/><rect y="10" width="10" height="10" fill="%23444"/></svg>') repeat;
    background-size: 20px 20px; border-radius: 8px; overflow: hidden;
  }
  .preview-card img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain;
  }

  .actions {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .btn {
    padding: 10px 24px; border-radius: 10px;
    font-size: 0.9rem; font-weight: 500; cursor: pointer;
    border: none; transition: all .2s;
  }
  .btn-primary { background: #7c5cfc; color: #fff; }
  .btn-primary:hover { background: #6a4ae8; }
  .btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }
  .btn-secondary { background: #2a2a2a; color: #ccc; }
  .btn-secondary:hover { background: #333; }
  .btn-danger { background: transparent; color: #e55; border: 1px solid #e554; }
  .btn-danger:hover { background: rgba(229,85,85,0.1); }
  .btn-cartoon { background: #f0a040; color: #111; }
  .btn-cartoon:hover { background: #e09030; }
  .btn-cartoon:disabled { background: #444; color: #888; cursor: not-allowed; }

  .status {
    text-align: center; font-size: 0.85rem; color: #888;
    min-height: 24px; margin-bottom: 12px;
  }
  .status.loading { color: #f0a040; }
  .status.done { color: #4caf6e; }

  #fileInput { display: none; }

  @media (max-width: 600px) {
    .preview-area.active { grid-template-columns: 1fr; }
    .style-tab { padding: 8px 16px; font-size: 0.85rem; }
  }
</style>
</head>
<body>
  <header>
    <h1>🪄 图片工具箱</h1>
    <p>上传图片，选择效果 · 10种风格可选 · 本地处理 v3</p>
  </header>

  <div class="container">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="remove-bg">🎯 一键抠图</button>
      <button class="mode-tab" data-mode="cartoon">🎨 风格化</button>
    </div>

    <div class="style-tabs" id="styleRow">
      <button class="style-tab active" data-style="comic">📘 漫画</button>
      <button class="style-tab" data-style="sketch">✏️ 素描</button>
      <button class="style-tab" data-style="oil">🖼️ 油画</button>
      <button class="style-tab" data-style="pixel">👾 像素</button>
      <button class="style-tab" data-style="emboss">🗿 浮雕</button>
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="icon">📤</div>
      <div class="hint">点击上传或拖拽图片到此处</div>
      <div class="sub">支持 JPG / PNG / WebP</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-area" id="previewArea">
      <div class="preview-card">
        <div class="label">原图</div>
        <div class="img-wrap"><img id="originalImg" alt="原图"></div>
      </div>
      <div class="preview-card">
        <div class="label" id="resultLabel">结果</div>
        <div class="img-wrap"><img id="resultImg" alt="结果"></div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="actions">
      <button class="btn btn-primary" id="processBtn" disabled>开始抠图</button>
      <button class="btn btn-cartoon" id="cartoonBtn" disabled style="display:none">生成风格图</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>下载 PNG</button>
      <button class="btn btn-danger" id="clearBtn" style="display:none">清除</button>
    </div>
  </div>

  <script type="module">
    import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.6.0/+esm";

    // DOM
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const processBtn = document.getElementById("processBtn");
    const cartoonBtn = document.getElementById("cartoonBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");
    const previewArea = document.getElementById("previewArea");
    const originalImg = document.getElementById("originalImg");
    const resultImg = document.getElementById("resultImg");
    const resultLabel = document.getElementById("resultLabel");
    const statusEl = document.getElementById("status");
    const modeTabs = document.querySelectorAll(".mode-tab");
    const styleTabs = document.querySelectorAll(".style-tab");
    const styleRow = document.getElementById("styleRow");

    let selectedFile = null;
    let resultBlob = null;
    let currentMode = "remove-bg";
    let currentStyle = "comic";

    const styleNames = {
      comic: "漫画", sketch: "素描", oil: "油画", pixel: "像素", emboss: "浮雕", vintage: "复古", popart: "波普", sharpen: "锐化", blur: "模糊", invert: "负片"
    };

    // Mode switching
    modeTabs.forEach(tab => {
      tab.addEventListener("click", () => {
        modeTabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentMode = tab.dataset.mode;
        updateUIForMode();
      });
    });

    // Style switching
    styleTabs.forEach(tab => {
      tab.addEventListener("click", () => {
        styleTabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentStyle = tab.dataset.style;
        resultImg.src = "";
        resultBlob = null;
        downloadBtn.disabled = true;
      });
    });

    function updateUIForMode() {
      if (currentMode === "remove-bg") {
        styleRow.style.display = "none";
        processBtn.style.display = "inline-block";
        cartoonBtn.style.display = "none";
        resultLabel.textContent = "抠图结果";
        if (selectedFile) processBtn.disabled = false;
      } else {
        styleRow.style.display = "flex";
        processBtn.style.display = "none";
        cartoonBtn.style.display = "inline-block";
        resultLabel.textContent = styleNames[currentStyle] + "效果";
        if (selectedFile) cartoonBtn.disabled = false;
      }
      resultImg.src = "";
      resultBlob = null;
      downloadBtn.disabled = true;
    }

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = "status " + (cls || "");
    }

    function selectFile(file) {
      if (!file.type.startsWith("image/")) {
        setStatus("请选择图片文件", "");
        return;
      }
      selectedFile = file;
      resultBlob = null;
      const url = URL.createObjectURL(file);
      originalImg.src = url;
      resultImg.src = "";
      previewArea.classList.add("active");
      downloadBtn.disabled = true;
      clearBtn.style.display = "inline-block";
      updateUIForMode();
      setStatus("已选择：" + file.name, "done");
    }

    // ====== Canvas helpers ======
    function getImageData(sourceImg, maxDim) {
      maxDim = maxDim || 1024;
      let w = sourceImg.naturalWidth, h = sourceImg.naturalHeight;
      const scale = Math.min(maxDim / Math.max(w, h), 1);
      w = Math.round(w * scale); h = Math.round(h * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(sourceImg, 0, 0, w, h);
      return { canvas, ctx, w, h, data: ctx.getImageData(0, 0, w, h) };
    }

    function toBlob(canvas) {
      return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    // ====== Style algorithms ======

    function comicStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      const src = data.data;
      // Bilateral-like blur
      const blurred = new Uint8ClampedArray(src);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const idx = (y * w + x) * 4;
          for (let c = 0; c < 3; c++) {
            let sum = 0;
            for (let dy = -1; dy <= 1; dy++)
              for (let dx = -1; dx <= 1; dx++)
                sum += src[((y+dy) * w + (x+dx)) * 4 + c];
            blurred[idx + c] = Math.round(sum / 9);
          }
        }
      }
      data.data.set(blurred);
      // Color quantization
      const levels = 8, step = 255 / (levels - 1);
      for (let i = 0; i < data.data.length; i += 4) {
        for (let c = 0; c < 3; c++)
          data.data[i + c] = Math.round(Math.round(data.data[i + c] / step) * step);
      }
      // Edge detection
      const gray = new Uint8ClampedArray(w * h);
      for (let i = 0; i < data.data.length; i += 4)
        gray[i >> 2] = 0.299 * data.data[i] + 0.587 * data.data[i+1] + 0.114 * data.data[i+2];
      const edges = new Uint8ClampedArray(w * h);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const i = y * w + x;
          const gx = -1*gray[i-w-1] + gray[i-w+1] + -2*gray[i-1] + 2*gray[i+1] + -1*gray[i+w-1] + gray[i+w+1];
          const gy = -1*gray[i-w-1] + -2*gray[i-w] + -1*gray[i-w+1] + gray[i+w-1] + 2*gray[i+w] + gray[i+w+1];
          edges[i] = Math.min(255, Math.sqrt(gx*gx + gy*gy));
        }
      }
      // Overlay
      const edgeT = 60;
      for (let i = 0; i < data.data.length; i += 4) {
        const e = edges[i >> 2];
        if (e > edgeT) {
          const d = Math.min(1, (e - edgeT) / 80);
          data.data[i] = Math.round(data.data[i] * (1 - d));
          data.data[i+1] = Math.round(data.data[i+1] * (1 - d));
          data.data[i+2] = Math.round(data.data[i+2] * (1 - d));
        }
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    function sketchStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      // Grayscale
      for (let i = 0; i < data.data.length; i += 4) {
        const g = 0.299 * data.data[i] + 0.587 * data.data[i+1] + 0.114 * data.data[i+2];
        data.data[i] = data.data[i+1] = data.data[i+2] = g;
      }
      // Invert
      for (let i = 0; i < data.data.length; i += 4) {
        data.data[i] = data.data[i+1] = data.data[i+2] = 255 - data.data[i];
      }
      // Gaussian blur (3x3)
      const blurred = new Uint8ClampedArray(data.data);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const idx = (y * w + x) * 4;
          blurred[idx] = Math.round((data.data[idx-4-w*4] + 2*data.data[idx-w*4] + data.data[idx+4-w*4]
            + 2*data.data[idx-4] + 4*data.data[idx] + 2*data.data[idx+4]
            + data.data[idx-4+w*4] + 2*data.data[idx+w*4] + data.data[idx+4+w*4]) / 16);
          blurred[idx+1] = blurred[idx+2] = blurred[idx];
        }
      }
      data.data.set(blurred);
      // Color dodge blend: base / (255 - blend) * 255
      const orig = getImageData(img);
      for (let i = 0; i < data.data.length; i += 4) {
        const base = 0.299 * orig.data.data[i] + 0.587 * orig.data.data[i+1] + 0.114 * orig.data.data[i+2];
        const blend = data.data[i];
        const v = Math.min(255, Math.round((base * 255) / Math.max(1, 255 - blend)));
        data.data[i] = data.data[i+1] = data.data[i+2] = v;
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    function oilStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img, 800);
      const src = data.data;
      const radius = 4, levels = 16;
      const out = new Uint8ClampedArray(src.length);
      for (let y = radius; y < h - radius; y++) {
        for (let x = radius; x < w - radius; x++) {
          const bins = new Array(levels).fill(0);
          const sumR = new Array(levels).fill(0);
          const sumG = new Array(levels).fill(0);
          const sumB = new Array(levels).fill(0);
          for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
              const idx = ((y+dy) * w + (x+dx)) * 4;
              const r = src[idx], g = src[idx+1], b = src[idx+2];
              const lvl = Math.min(levels - 1, Math.floor((r + g + b) / (3 * 256 / levels)));
              bins[lvl]++;
              sumR[lvl] += r; sumG[lvl] += g; sumB[lvl] += b;
            }
          }
          let best = 0, maxCount = 0;
          for (let l = 0; l < levels; l++) {
            if (bins[l] > maxCount) { maxCount = bins[l]; best = l; }
          }
          const idx = (y * w + x) * 4;
          out[idx] = Math.round(sumR[best] / maxCount);
          out[idx+1] = Math.round(sumG[best] / maxCount);
          out[idx+2] = Math.round(sumB[best] / maxCount);
          out[idx+3] = 255;
        }
      }
      data.data.set(out);
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    function pixelStyle(img) {
      const maxDim = 1024;
      let ow = img.naturalWidth, oh = img.naturalHeight;
      const scale = Math.min(maxDim / Math.max(ow, oh), 1);
      ow = Math.round(ow * scale); oh = Math.round(oh * scale);
      // Pixel size: target ~48 blocks across
      const pxSize = Math.max(2, Math.round(Math.min(ow, oh) / 48));
      const sw = Math.round(ow / pxSize), sh = Math.round(oh / pxSize);
      // Step 1: downscale to tiny resolution
      const small = document.createElement("canvas");
      small.width = sw; small.height = sh;
      const sctx = small.getContext("2d");
      sctx.drawImage(img, 0, 0, sw, sh);
      // Step 2: upscale back with nearest-neighbor
      const big = document.createElement("canvas");
      big.width = ow; big.height = oh;
      const bctx = big.getContext("2d");
      bctx.imageSmoothingEnabled = false;
      bctx.drawImage(small, 0, 0, ow, oh);
      return big;
    }

    function embossStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      // Grayscale
      for (let i = 0; i < data.data.length; i += 4) {
        const g = 0.299 * data.data[i] + 0.587 * data.data[i+1] + 0.114 * data.data[i+2];
        data.data[i] = data.data[i+1] = data.data[i+2] = g;
      }
      const src = new Uint8ClampedArray(data.data);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const idx = (y * w + x) * 4;
          const v = src[((y-1)*w + (x-1))*4] - src[((y+1)*w + (x+1))*4] + 128;
          data.data[idx] = data.data[idx+1] = data.data[idx+2] = Math.max(0, Math.min(255, v));
        }
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

        function vintageStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      // Sepia toning
      for (let i = 0; i < data.data.length; i += 4) {
        const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
        data.data[i]   = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
        data.data[i+1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
        data.data[i+2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
      }
      ctx.putImageData(data, 0, 0);
      // Vignette: darken corners
      const cx = w / 2, cy = h / 2, maxD = Math.sqrt(cx*cx + cy*cy);
      const overlay = ctx.createRadialGradient(cx, cy, maxD * 0.45, cx, cy, maxD * 1.05);
      overlay.addColorStop(0, "rgba(0,0,0,0)");
      overlay.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = overlay; ctx.fillRect(0, 0, w, h);
      // Grain
      const imgData = ctx.getImageData(0, 0, w, h);
      for (let i = 0; i < imgData.data.length; i += 4) {
        const noise = (Math.random() - 0.5) * 30;
        imgData.data[i]   = Math.max(0, Math.min(255, imgData.data[i] + noise));
        imgData.data[i+1] = Math.max(0, Math.min(255, imgData.data[i+1] + noise));
        imgData.data[i+2] = Math.max(0, Math.min(255, imgData.data[i+2] + noise));
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas;
    }

    function popartStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      // Posterize to 4 levels
      const levels = 4, step = 255 / (levels - 1);
      for (let i = 0; i < data.data.length; i += 4) {
        for (let c = 0; c < 3; c++)
          data.data[i + c] = Math.round(Math.round(data.data[i + c] / step) * step);
      }
      // Boost saturation: shift colors toward primaries
      for (let i = 0; i < data.data.length; i += 4) {
        const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
        const maxC = Math.max(r, g, b), minC = Math.min(r, g, b);
        if (maxC - minC > 30) {
          // Amplify dominant channel
          if (r === maxC) { data.data[i] = Math.min(255, r * 1.2); data.data[i+1] = Math.max(0, data.data[i+1] * 0.8); data.data[i+2] = Math.max(0, data.data[i+2] * 0.8); }
          else if (g === maxC) { data.data[i+1] = Math.min(255, g * 1.2); data.data[i] = Math.max(0, data.data[i] * 0.8); data.data[i+2] = Math.max(0, data.data[i+2] * 0.8); }
          else { data.data[i+2] = Math.min(255, b * 1.2); data.data[i] = Math.max(0, data.data[i] * 0.8); data.data[i+1] = Math.max(0, data.data[i+1] * 0.8); }
        }
        // Edge darkening
        const lum = 0.299 * r + 0.587 * g + 0.114 * b;
        if (lum < 60) { data.data[i] = data.data[i+1] = data.data[i+2] = 0; }
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    function sharpenStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      const src = new Uint8ClampedArray(data.data);
      const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          for (let c = 0; c < 3; c++) {
            let v = 0;
            for (let dy = -1; dy <= 1; dy++)
              for (let dx = -1; dx <= 1; dx++)
                v += src[((y+dy) * w + (x+dx)) * 4 + c] * kernel[(dy+1)*3 + (dx+1)];
            data.data[(y * w + x) * 4 + c] = Math.max(0, Math.min(255, v));
          }
        }
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    function blurStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      const src = new Uint8ClampedArray(data.data);
      const r = 5, size = 2 * r + 1, count = size * size;
      for (let y = r; y < h - r; y++) {
        for (let x = r; x < w - r; x++) {
          const idx = (y * w + x) * 4;
          let sr = 0, sg = 0, sb = 0;
          for (let dy = -r; dy <= r; dy++)
            for (let dx = -r; dx <= r; dx++) {
              const i = ((y+dy) * w + (x+dx)) * 4;
              sr += src[i]; sg += src[i+1]; sb += src[i+2];
            }
          data.data[idx] = sr / count; data.data[idx+1] = sg / count; data.data[idx+2] = sb / count;
        }
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    function invertStyle(img) {
      const { canvas, ctx, w, h, data } = getImageData(img);
      for (let i = 0; i < data.data.length; i += 4) {
        data.data[i] = 255 - data.data[i];
        data.data[i+1] = 255 - data.data[i+1];
        data.data[i+2] = 255 - data.data[i+2];
      }
      ctx.putImageData(data, 0, 0);
      return canvas;
    }

    const styleFns = { comic: comicStyle, sketch: sketchStyle, oil: oilStyle, pixel: pixelStyle, emboss: embossStyle, vintage: vintageStyle, popart: popartStyle, sharpen: sharpenStyle, blur: blurStyle, invert: invertStyle };

    // ====== Cartoon button ======
    cartoonBtn.addEventListener("click", () => {
      if (!selectedFile) return;
      cartoonBtn.disabled = true;
      resultLabel.textContent = styleNames[currentStyle] + "效果";
      setStatus("正在生成" + styleNames[currentStyle] + "风格...", "loading");

      requestAnimationFrame(() => {
        setTimeout(() => {
          try {
            const fn = styleFns[currentStyle];
            const resultCanvas = fn(originalImg);
            toBlob(resultCanvas).then(blob => {
              resultBlob = blob;
              resultImg.src = URL.createObjectURL(blob);
              downloadBtn.disabled = false;
              setStatus(styleNames[currentStyle] + "风格完成！", "done");
              cartoonBtn.disabled = false;
            });
          } catch (err) {
            console.error(err);
            setStatus("处理失败：" + err.message, "");
            cartoonBtn.disabled = false;
          }
        }, 50);
      });
    });

    // ====== Background removal ======
    processBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      processBtn.disabled = true;
      setStatus("正在抠图中，请稍候...（首次加载模型可能需要几十秒）", "loading");
      try {
        const blob = await removeBackground(selectedFile);
        resultBlob = blob;
        resultImg.src = URL.createObjectURL(blob);
        downloadBtn.disabled = false;
        setStatus("抠图完成！", "done");
      } catch (err) {
        console.error(err);
        setStatus("抠图失败：" + err.message, "");
      } finally {
        processBtn.disabled = false;
      }
    });

    // Click to pick
    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      if (e.target.files.length) selectFile(e.target.files[0]);
    });

    // Drag & drop
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("drag-over");
    });
    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("drag-over");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });

    // Download
    downloadBtn.addEventListener("click", () => {
      if (!resultBlob) return;
      const url = URL.createObjectURL(resultBlob);
      const a = document.createElement("a");
      const baseName = selectedFile.name.replace(/\.[^.]+$/, "");
      const suffix = currentMode === "remove-bg"
        ? "_去背景"
        : "_" + styleNames[currentStyle];
      a.href = url;
      a.download = baseName + suffix + ".png";
      a.click();
      URL.revokeObjectURL(url);
    });

    // Clear
    clearBtn.addEventListener("click", () => {
      selectedFile = null;
      resultBlob = null;
      originalImg.src = "";
      resultImg.src = "";
      previewArea.classList.remove("active");
      processBtn.disabled = true;
      cartoonBtn.disabled = true;
      downloadBtn.disabled = true;
      clearBtn.style.display = "none";
      setStatus("", "");
      fileInput.value = "";
    });
  </script>
</body>
</html>
